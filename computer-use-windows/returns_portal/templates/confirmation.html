<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dispatch Record Created</title>
  <style>
    body { background: #ffffff; font-family: Tahoma, Arial, sans-serif; font-size: 13px; color: #000; margin: 0; }
    .banner { background: #708090; color: #ffffff; padding: 10px 16px; border-bottom: 3px solid #4d5663; }
    .banner h1 { margin: 0; font-size: 16px; font-weight: bold; }
    .banner .sub { font-size: 11px; }
    .content { padding: 40px 24px; }
    .ok-box {
      border: 1px solid #2e7d32; background: #e8f5e9; padding: 20px 24px;
      max-width: 520px; font-size: 14px;
    }
    .ok-box .check { color: #2e7d32; font-weight: bold; font-size: 16px; }
    .ref { font-family: "Courier New", monospace; font-size: 16px; font-weight: bold; }
    .footer { margin-top: 30px; border-top: 1px solid #999; padding: 8px 24px; font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <div class="banner">
    <h1>Siemens Customer Returns Portal</h1>
    <div class="sub">Internal Use Only</div>
  </div>

  <div class="content">
    <div class="ok-box">
      <div class="check">&#10004; Dispatch record created.</div>
      <p>Reference: <span class="ref">{{ reference }}</span></p>
      <p>You may close this tab.</p>
      <p style="margin-top:16px"><a href="/">&#8592; New Record</a></p>
    </div>
  </div>

  <div class="footer">&copy; Siemens AG &mdash; Internal Portal v1.4</div>
</body>
</html>
